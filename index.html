<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Mapa Londres</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body { margin:0; }
  #map { height:100vh; }

  .modal {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: white;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
    transform: translateY(100%);
    transition: 0.3s;
    z-index: 999;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal.open { transform: translateY(0); }

  .modal img {
    width: 100%;
    height: 220px;
    object-fit: cover;
  }

  .modal-content { padding: 16px; }

  .close {
    position:absolute;
    top:10px;
    right:16px;
    font-size:22px;
    cursor:pointer;
  }
</style>
</head>
<body>
<div id="map"></div>

<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">×</span>
  <img id="modal-img" src="">
  <div class="modal-content">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

var map = L.map('map').setView([51.5074, -0.1278], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// 🔥 MAPEO COMPLETO NUEVO
var PLACE_LOCAL_IMAGE_MAP = {
  "Kensal Green Cemetery": "kensal-green.jpg",
  "Bank of England": "bank-england.jpg",
  "Seven Dials": "seven-dials.jpg",
  "Leighton House Museum": "leighton-house.jpg",
  "Ye Olde Cheshire Cheese": "ye-olde-cheshire.jpg",
  "Columbia Road Flower Market": "columbia-road.jpg",
  "Inns of Court": "inns-of-court.jpg",
  "Churchill War Rooms": "churchill-war-rooms.jpg",
  "Whitechapel (Jack the Ripper)": "whitechapel-ripper.jpg",
  "George Orwell House": "orwell-house.jpg",
  "Oscar Wilde House": "oscar-wilde-house.jpg",
  "Bloomsbury": "bloomsbury.jpg",
  "Abbey Road": "abbey-road.jpg",
  "10 Downing Street": "downing-street.jpg",
  "Karl Marx House": "karl-marx-house.jpg",
  "Ministry of Magic Entrance": "ministry-of-magic.jpg",
  "Arthur Conan Doyle": "conan-doyle.jpg",
  "Tesco Meal Deal": "tesco-meal-deal.jpg",
  "Beigel Bake": "beigel-bake.jpg",
  "Pret a Manger": "pret.jpg",
  "Greggs": "greggs.jpg",
  "Flat White Soho": "flat-white.jpg",
  "Franco Manca": "franco-manca.jpg",
  "Monmouth Coffee": "monmouth-coffee.jpg",
  "Pub Pint": "pinta-pub.jpg",
  "Kappacasein": "kappacasein.jpg",
  "Pilpel": "pilpel.jpg",
  "Ozone Coffee": "ozone.jpg",
  "Chicken Shop": "pollo-frito-barrio.jpg",
  "Fabrique Bakery": "fabrique.jpg",
  "Boxpark": "boxpark.jpg",
  "Barbican": "barbican.jpg",
  "St Dunstan in the East": "st-dunstan.jpg",
  "Little Venice": "little-venice.jpg",
  "Whitechapel Gallery": "whitechapel-gallery.jpg",
  "Sky Garden": "sky-garden.jpg",
  "Black Railings": "rejas-negras.jpg",
  "Blue Plaques": "placas-azules.jpg",
  "The Queue": "la-fila.jpg",
  "Colorful Doors": "las-puertas.jpg",
  "Soho Streets": "calles-sin-logica.jpg",
  "Carnaby Street": "carnaby-street.jpg"
};

// 🔥 EJEMPLO DE LUGARES (simplificado)
var places = [
  { name: "Seven Dials", lat:51.514, lng:-0.126, desc:"Cruce icónico" },
  { name: "Abbey Road", lat:51.532, lng:-0.178, desc:"Beatles" },
  { name: "Sky Garden", lat:51.511, lng:-0.083, desc:"Vista panorámica" }
];

function openModal(place){
  document.getElementById('modal-title').innerText = place.name;
  document.getElementById('modal-desc').innerText = place.desc;

  var img = PLACE_LOCAL_IMAGE_MAP[place.name];
  document.getElementById('modal-img').src = img ? './'+img : '';

  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

places.forEach(p => {
  var marker = L.marker([p.lat, p.lng]).addTo(map);
  marker.on('click', () => openModal(p));
});

</script>
</body>
</html>
